<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>

<body>

    <section class="left">
        <img src="./css-task/img/logo.svg" alt="">
    </section>

    <section class="right">

        

        <main>

            <section>
              <p class="main-top-text">Get iintoo it today</p>
              <p class="under-top-text">There is no charge or obligation upon registration.</p>
            </section>

            <div class="img-box">    
                    <button class="fcb-btn" type="submit">
                      <span><img src="./fcblogo3.svg" alt=""></span>
                      <span class="text">Register with Facebook</span>
                    </button>

                    <button class="link-btn" type="submit">
                      <img src="./inlogo3.svg" alt="">
                      <span class="text">Register with Linkedin</span>
                    </button>
                <!-- <a href="https://www.facebook.com"><img src="./fcb-img.svg" alt=""></a>    
                <a href="https://www.google.com"><img class="link-img" src="./link-img.svg" alt=""></a> -->
            </div>

            <div class="divider">    
                <div class="line"></div>OR<div class="line"></div>
            </div>

            <form class="login" method="post">

                <div class="user-data-cont">
                    <div class="email-box">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                    </div>

                    <div class="phone-box">
                    <label for="phone">Phone</label>
                    <input type="tel" name="phone" id="phone" required>
                    </div>
                </div>
                
                <div class="middle-text">What type are investor are you?</div>
                <div class="under-middle-text">Select the type of investor are you below.</div>

                <div class="rad-btn">

                    <div>
                    
                       <input type="radio" id="ind" value="individual" name="rad-btn">
                       <label for="ind">Individual</label>
                       <label title="radio 1">
                          <span class="title">&#9432;</span>
                       </label>

                    </div>

                    <div>

                        <input type="radio" id="bus" name="rad-btn" required value="business"> 
                        <label for="bus">Business </label>

                        <label title="radio 2">
                          <span class="title">&#9432;</span>
                        </label>
                        
                    </div>

                    <div>

                        <input type="radio" id="ira" value="ira" name="rad-btn">
                        <label for="ira">IRA</label>
                        <label title="radio 3"><span class="title">&#9432;</span></label>

                    </div>

                    <div>

                        <input type="radio" id="trust" name="rad-btn" value="trust">
                        <label for="trust">Trust</label>
                        <label title="radio 4">
                          <span class="title">&#9432;</span>
                        </label>

                    </div>

                </div>


                <div class="terms">
                     <input type="checkbox" name="agree" id="agree" value="agree">
                     <label for="agree">I agree to the terms and receiving notification from iinto <span><a href="https://www.google.com">View full terms</a></span></label>
                     
                </div>

                <div class="create-acc-btn">
                    <button  type="submit">Create Account</button>
                </div>

            </form>

        </main>

    </section>
    
</body>
</html>
